apiVersion: user.keycloak.m.crossplane.io/v1alpha1
kind: User
metadata:
  name: test-user
spec:
  forProvider:
    realmId: basic-realm
    email: test-user@example.com
    enabled: true
    firstName: Test
    lastName: User
    username: test-user
    initialPassword:
    - valueSecretRef:
        name: test-user-credentials
        key: password
  providerConfigRef:
    name: keycloak-provider-config
    kind: ProviderConfig
---
apiVersion: v1
kind: Secret
metadata:
  name: test-user-credentials
type: Opaque
stringData:
  password: test-user-password